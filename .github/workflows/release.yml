name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.4'
  APP_NAME: 'WLED-Audio-Sender'

jobs:
  test:
    uses: ./.github/workflows/test.yml
    with:
      flutter-version: '3.27.4'

  build-android:
    needs: [test]
    uses: ./.github/workflows/build-android.yml
    with:
      flutter-version: '3.27.4'
    secrets:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

  build-ios:
    name: Build iOS Release
    needs: [test]
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Update version with git hash and epoch build number
        run: |
          CURRENT_VERSION=$(awk '/^version:/ {print $2}' pubspec.yaml)
          BASE_VERSION=$(echo $CURRENT_VERSION | cut -d '+' -f 1)
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_NUMBER=$(date +%s)
          sed -i '' "s/^version:.*/version: ${BASE_VERSION}-${SHORT_HASH}+${BUILD_NUMBER}/" pubspec.yaml
          echo "Updated version to ${BASE_VERSION}-${SHORT_HASH}+${BUILD_NUMBER}"

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r app-release.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/app-release.ipa
          if-no-files-found: error

  build-macos:
    name: Build macOS Release
    needs: [test]
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Update version with git hash and epoch build number
        run: |
          CURRENT_VERSION=$(awk '/^version:/ {print $2}' pubspec.yaml)
          BASE_VERSION=$(echo $CURRENT_VERSION | cut -d '+' -f 1)
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_NUMBER=$(date +%s)
          sed -i '' "s/^version:.*/version: ${BASE_VERSION}-${SHORT_HASH}+${BUILD_NUMBER}/" pubspec.yaml
          echo "Updated version to ${BASE_VERSION}-${SHORT_HASH}+${BUILD_NUMBER}"

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Create ZIP
        run: |
          cd build/macos/Build/Products/Release
          zip -r ${{ env.APP_NAME }}-macos.zip wled_audio_sender.app

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/${{ env.APP_NAME }}-macos.zip
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/android-apk/app-release.apk
            artifacts/android-appbundle/app-release.aab
            artifacts/ios-ipa/app-release.ipa
            artifacts/macos-app/${{ env.APP_NAME }}-macos.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
